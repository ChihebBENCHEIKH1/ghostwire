# ═══════════════════════════════════════════════════════════════════════════════
#  Ghostwire — Production Docker Compose Stack
#  Run: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════════════

name: ghostwire

services:

  # ── NGINX Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ghostwire-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - ghostwire-public
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost/api-ws}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    container_name: ghostwire-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ghostwire-internal
      - ghostwire-public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Node.js Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostwire-backend
    restart: unless-stopped
    environment:
      NODE_ENV:         production
      PORT:             3001
      FRONTEND_ORIGIN:  ${FRONTEND_ORIGIN:-http://localhost}
      API_KEYS:         ${API_KEYS}
      JWT_SECRET:       ${JWT_SECRET}
      DB_PATH:          /data/pipeline.db
      OLLAMA_HOST:      ${OLLAMA_HOST:-http://ollama:11434}
    expose:
      - "3001"
    volumes:
      - pipeline_data:/data
      - ghostwire_stack:/app/.ghostwire-stack
      - /var/run/docker.sock:/var/run/docker.sock  # for Docker provisioner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ghostwire-internal
      - ghostwire-public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ghostwire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ghostwire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-pipeline}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - ghostwire-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghostwire} -d ${POSTGRES_DB:-pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghostwire-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 20 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - ghostwire-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (Local LLM) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ghostwire-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - ghostwire-internal
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Ollama Model Bootstrapper ────────────────────────────────────────────────
  ollama-bootstrap:
    image: ollama/ollama:latest
    container_name: ghostwire-ollama-bootstrap
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull deepseek-r1:1.5b &&
        echo 'Model ready.'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ghostwire-internal

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ghostwire-public:
    driver: bridge
  ghostwire-internal:
    driver: bridge
    internal: true  # no external access — backend/db not directly reachable

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pipeline_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  ghostwire_stack:
    driver: local
  nginx_logs:
    driver: local
