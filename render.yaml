services:
  - type: web
    name: ghostwire-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: API_KEYS
        value: sk-ghostwire-demo
      - key: FRONTEND_ORIGIN
        sync: false
